<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>記事一覧 | 未回収設定・ロアアーカイブ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@500;700&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/base.css">
  <link rel="stylesheet" href="assets/css/list.css">
</head>
<body>
  <header class="site-header">
    <div class="utility-bar">
      <div class="container utility-inner">
        <p>架空設定・未回収要素を整理するロアアーカイブ</p>
        <p>一覧から記事詳細へ移動できます</p>
      </div>
    </div>
    <div class="container site-head-inner">
      <a class="brand-link" href="index.html">
        <p class="brand-kicker">Lore Archive</p>
        <h1 class="brand-title">未回収設定・ロアアーカイブ</h1>
      </a>
      <p class="head-note">キーワード、媒体、タグから気になる記事を探せます。</p>
    </div>
    <div class="site-nav-wrap">
      <nav class="container site-nav" aria-label="グローバルナビゲーション">
        <a class="nav-link" href="index.html">トップ</a>
        <a class="nav-link active" href="entries.html">記事一覧</a>
        <a class="nav-link" href="categories.html">タグ一覧</a>
      </nav>
    </div>
  </header>

  <main>
    <div class="container page-stack">
      <section class="panel page-intro">
        <p class="page-intro-kicker">記事検索</p>
        <h2>記事一覧</h2>
        <p>検索語、媒体、タグで絞り込みながら記事を探せます。</p>
      </section>

      <div class="page-shell">
        <div class="page-main">
          <section class="panel section-panel">
            <div class="section-titlebar">
              <h2>絞り込み</h2>
            </div>

            <div class="filters-grid">
              <label class="field">
                <span>キーワード</span>
                <input id="searchInput" class="input" type="search" placeholder="作品名 / 記事名 / 概要 / 論点">
              </label>

              <label class="field">
                <span>媒体</span>
                <select id="mediumSelect" class="select">
                  <option value="all">すべて</option>
                </select>
              </label>

              <label class="field">
                <span>タグ</span>
                <select id="tagSelect" class="select">
                  <option value="all">すべて</option>
                </select>
              </label>
            </div>

            <div class="toolbar">
              <p id="resultSummary" class="muted">読み込み中...</p>
              <button id="resetBtn" class="button ghost" type="button">条件をリセット</button>
            </div>
          </section>

          <section class="panel section-panel">
            <div id="entryList" class="entry-list" aria-live="polite">
              <p class="empty-state">記事を読み込み中です...</p>
            </div>
          </section>
        </div>

        <aside class="page-side">
          <section class="panel sidebar-box">
            <h2>一覧の使い方</h2>
            <p>分類は廃止して、タグ中心で整理しています。主タグと補助タグを組み合わせて探してください。</p>
          </section>
        </aside>
      </div>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container footer-inner">
      <p>
        バージョン:
        <strong id="siteVersion">-</strong>
        /
        更新日:
        <time id="siteUpdatedAt" datetime="">-</time>
      </p>
      <p>未回収設定・ロアアーカイブを整理するための公開アーカイブです。</p>
    </div>
  </footer>

  <script type="module" src="assets/js/list.js"></script>
</body>
</html>
