<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>未回収設定WEB辞典</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/base.css">
  <link rel="stylesheet" href="assets/css/home.css">
</head>
<body>
  <header class="site-header">
    <div class="container site-head-inner">
      <a class="brand-link" href="index.html">
        <p class="brand-kicker">Lore Index</p>
        <h1 class="brand-title">未回収設定WEB辞典</h1>
      </a>
      <nav class="site-nav" aria-label="グローバルナビ">
        <a class="nav-link active" href="index.html">トップ</a>
        <a class="nav-link" href="entries.html">用語一覧</a>
        <a class="nav-link" href="categories.html">分類一覧</a>
      </nav>
    </div>
  </header>

  <main>
    <div class="container page-stack">
      <section class="panel hero-panel">
        <div class="hero-copy">
          <p class="hero-kicker">完結作品を対象にした参照辞典</p>
          <h2>作中未回収・制作都合の設定を、調べやすい構造で記録する</h2>
          <p>
            この辞典は「用語一覧」「分類一覧」「用語詳細」を分離し、
            1用語ごとにURLを持てる情報構造を採用しています。
          </p>
        </div>
        <form class="quick-search" action="entries.html" method="get">
          <label for="quickSearchInput">キーワード検索</label>
          <div class="quick-search-row">
            <input
              id="quickSearchInput"
              name="q"
              type="search"
              placeholder="例: GSボール / ダークオーシャン / フーゴ"
            >
            <button type="submit" class="button primary">一覧で探す</button>
          </div>
        </form>
      </section>

      <section class="metrics-grid" aria-label="辞典メトリクス">
        <article class="panel metric-card">
          <div class="metric-label">エントリ数</div>
          <div class="metric-value" id="metricCount">-</div>
        </article>
        <article class="panel metric-card">
          <div class="metric-label">作品数</div>
          <div class="metric-value" id="metricWorks">-</div>
        </article>
        <article class="panel metric-card">
          <div class="metric-label">媒体数</div>
          <div class="metric-value" id="metricMedia">-</div>
        </article>
      </section>

      <section class="panel section-panel">
        <div class="section-head">
          <h2>分類から探す</h2>
          <a href="categories.html" class="button ghost">分類ページへ</a>
        </div>
        <div id="classificationGrid" class="class-grid">
          <p class="empty-state">分類情報を読み込んでいます...</p>
        </div>
      </section>

      <section class="panel section-panel">
        <div class="section-head">
          <h2>注目エントリ</h2>
          <a href="entries.html" class="button ghost">すべて表示</a>
        </div>
        <ul id="recentList" class="recent-list">
          <li class="empty-state">エントリを読み込んでいます...</li>
        </ul>
      </section>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container footer-inner">
      <p>
        バージョン:
        <strong id="siteVersion">-</strong>
        /
        更新日:
        <time id="siteUpdatedAt" datetime="">-</time>
      </p>
      <p>未回収設定WEB辞典（構造化試作）</p>
    </div>
  </footer>

  <script type="module" src="assets/js/home.js"></script>
</body>
</html>
